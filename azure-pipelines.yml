trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: kle-secrets
  - name: nodeVersion
    value: '20.x'

steps:
  - task: NodeTool@0
    displayName: 'Use Node.js $(nodeVersion)'
    inputs:
      versionSpec: '$(nodeVersion)'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm run build:secure
    displayName: 'Build secure production bundle'

  - task: AzureStaticWebApp@0
    displayName: 'Deploy to Azure Static Web Apps'
    inputs:
      app_location: '/dist'
      output_location: ''
      skip_app_build: true
      skip_api_build: true
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
    
      - task: CopyFiles@2
    displayName: 'Prepare backend files'
    inputs:
      SourceFolder: '$(System.DefaultWorkingDirectory)'
      Contents: |
        backend/**
      TargetFolder: '$(Build.ArtifactStagingDirectory)/backend-app'

  - task: ArchiveFiles@2
    displayName: 'Package backend'
    inputs:
      rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/backend-app'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/kle-backend.zip'
      replaceExistingArchive: true

  - task: AzureWebApp@1
    displayName: 'Deploy backend to Azure App Service'
    inputs:
      azureSubscription: 'kle-backend-connection'
      appType: 'webAppLinux'
      appName: 'kle-backend'
      package: '$(Build.ArtifactStagingDirectory)/kle-backend.zip'
      startUpCommand: 'node backend/server.mjs'