<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso no autorizado</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f3f5f9;
            color: #17233d;
        }

        main {
            max-width: 560px;
            margin: 24px;
            padding: 36px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        a {
            color: #234a91;
        }
    </style>
</head>

<body>
    <main>
        <h1>Acceso no autorizado</h1>
        <p>Tu cuenta ha iniciado sesión, pero no tiene permiso para acceder a KLE.</p>
        <p>Contacta con el administrador de la aplicación.</p>
        <a href="/.auth/logout">Cerrar sesión</a>
    </main>
</body>

</html>
